events {
     worker_connections 768;
     # multi_accept on;
}

http {

    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ## SSL Global Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ## Logging
    access_log /var/log/nginx/access.log;

    ## Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    ## Hide headers
    proxy_hide_header X-Powered-By;
    fastcgi_hide_header X-Powered-By;

    ## Timeouts
    keepalive_timeout 65;
    keepalive_requests 1000;

    client_body_timeout 10;
    client_header_timeout 10;
    send_timeout 10;

    ## Limits
    client_max_body_size 10M;

    ## Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;

    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        text/xml
        application/xml+rss
        image/svg+xml;

    ## HTTP to HTTPS Redirect
    server {
        listen 80;
        listen [::]:80;
        server_name 192.168.56.230 localhost;

        return 301 https://$host$request_uri;
    }

    ## HTTPS Server & Reverse Proxy Config
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name 192.168.56.230 localhost;
        
        index index.html;
        root /var/www/html;

        # Self-signed certificate paths
        ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
        ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;

        # Standard proxy headers passed down to backend services
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        ## Proxy Routes
        
        # Route 1: Prometheus
        location /prometheus {
            proxy_pass http://localhost:9090; 

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
    
            # Pass the actual headers so Prometheus knows it's being proxied
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Route 2: Grafana
        location /grafana/ {
            proxy_pass http://localhost:3000;
 
            proxy_set_header Host $http_host; 
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Relax CSP frame restrictions just for Grafana
            proxy_hide_header Content-Security-Policy;
            add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval'; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self';" always;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
        
        # Route 3: Uptime-Kuma
        location /kuma {
            proxy_pass http://localhost:3001;

            # Pass the actual headers so Uptime-Kuma knows it's being proxied
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

        }
    }

    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}