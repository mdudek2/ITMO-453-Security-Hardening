apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: https://127.0.0.1/prometheus/
    isDefault: true
    editable: false
    
    jsonData:
      tlsSkipVerify: true

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://localhost:3100
    editable: false

    jsonData:
      maxLines: 1000