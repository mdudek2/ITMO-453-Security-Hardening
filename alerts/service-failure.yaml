apiVersion: 1

groups:
  - orgId: 1
    name: Services
    folder: ITMO-453-Project
    interval: 1m

    rules:
      - uid: systemd_failed_units
        title: Systemd Failed Units

        condition: B

        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 60
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: node_systemd_units{instance="127.0.0.1:9100",job="node",state="failed"}
              instant: true
              range: false
              refId: A

          - refId: B
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
                  type: query

        noDataState: NoData
        execErrState: Error
        for: 1m

        annotations:
          summary: One or more systemd units are in the failed state.

        notification_settings:
          receiver: Email Alerts