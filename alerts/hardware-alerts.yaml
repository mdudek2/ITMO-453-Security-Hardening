apiVersion: 1

groups:
  - orgId: 1
    name: Hardware Alerts
    folder: ITMO-453-Project
    interval: 1m

    rules:

      - uid: high-cpu-usage
        title: High CPU Usage
        condition: C
        for: 5m

        labels:
          severity: warning
          category: hardware

        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage has exceeded 90% for 5 minutes."

        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              expr: |
                100 - (
                  avg by(instance) (
                    irate(node_cpu_seconds_total{mode="idle"}[5m])
                  ) * 100
                )
              format: time_series
              legendFormat: "{{instance}}"

          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              expression: A
              type: reduce
              reducer: max

          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              expression: B
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 90
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    type: max
                  type: query


      - uid: high-memory-usage
        title: High Memory Usage
        condition: C
        for: 5m

        labels:
          severity: warning
          category: hardware

        annotations:
          summary: "High memory usage detected"
          description: "Memory usage has exceeded 90% for 5 minutes."

        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              expr: |
                (
                  1 -
                  (
                    node_memory_MemAvailable_bytes
                    /
                    node_memory_MemTotal_bytes
                  )
                ) * 100
              format: time_series
              legendFormat: "{{instance}}"

          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              expression: A
              type: reduce
              reducer: max

          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              expression: B
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 90
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    type: max
                  type: query


      - uid: low-disk-capacity
        title: Low Disk Capacity
        condition: C
        for: 10m

        labels:
          severity: warning
          category: hardware

        annotations:
          summary: "Low disk capacity detected"
          description: "Disk free space has dropped below 10%."

        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              expr: |
                (
                  node_filesystem_avail_bytes{
                    fstype!~"tmpfs|overlay"
                  }
                  /
                  node_filesystem_size_bytes{
                    fstype!~"tmpfs|overlay"
                  }
                ) * 100
              format: time_series
              legendFormat: "{{instance}} {{mountpoint}}"

          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              expression: A
              type: reduce
              reducer: min

          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              expression: B
              type: threshold
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 10
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    type: min
                  type: query